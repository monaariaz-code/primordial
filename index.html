    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const apiKey = "AIzaSyCIbqtp9KJnCfyyfq_-67dlVO0of2drIic";
        
        const CUSHION_CATALOG = [
            { id: 'c1', name: 'Diamante terra', src: 'https://i.postimg.cc/Cz2Nqz5R/image.png' },
            { id: 'c2', name: 'Escala naval', src: 'https://i.postimg.cc/R3dJwDdd/image.png' },
            { id: 'c3', name: 'Paralelo 50/50', src: 'https://i.postimg.cc/SnNhJ1nt/image.png' },
            { id: 'c4', name: 'Dualidad lavanda', src: 'https://i.postimg.cc/878ZY7GD/image.png' }
        ];

        const FONDOS_SERVILLETAS = [
            { id: 'fs1', name: 'Servilleta Beige', src: 'https://i.postimg.cc/Pq24Hy70/Captura-de-pantalla-2026-05-07-a-la(s)-17-12-49.png' }
        ];

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        let errorDetalle = `Error ${response.status}`;
                        try {
                            const errJson = await response.json();
                            errorDetalle = errJson.error?.message || errorDetalle;
                        } catch(e) {
                            errorDetalle = await response.text() || errorDetalle;
                        }
                        if (response.status === 400) {
                            throw new Error(`Error 400: ${errorDetalle}`);
                        }
                        if (response.status === 403) {
                            throw new Error(`Error 403: Tu API Key no tiene permisos. Detalle: ${errorDetalle}`);
                        }
                        throw new Error(`Error de la IA: ${errorDetalle}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        const procesarFondoTransparente = (base64Image) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        if (r > 240 && g > 240 && b > 240) {
                            data[i + 3] = 0;
                        } else if (r > 200 && g > 200 && b > 200) {
                            data[i + 3] = Math.max(0, 255 - (r - 200) * 6.375);
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => reject(new Error("No se pudo procesar la transparencia."));
                img.src = base64Image;
            });
        };

        function AreaDeTrabajo({ titulo, subtitulo1, subtitulo2, catalogo, fondosBase, textoVacio, initSize = 180, usarIA = false, esEstampado = false }) {
            const [bgImage, setBgImage] = useState(null);
            const [placedItems, setPlacedItems] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [action, setAction] = useState(null);
            const [promptIA, setPromptIA] = useState("");
            const [generandoIA, setGenerandoIA] = useState(false);
            const [errorIA, setErrorIA] = useState("");

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) setBgImage(URL.createObjectURL(file));
            };

            const addItem = (src) => {
                if (!bgImage) return alert(`Primero sube una foto en la sección: ${titulo}`);
                const newItem = { id: Date.now() + Math.random(), src, x: 150, y: 150, w: initSize };
                setPlacedItems([...placedItems, newItem]);
                setSelectedId(newItem.id);
            };

            const generarEstampado = async () => {
                if (!bgImage) return alert(`Primero escoge un fondo.`);
                if (!promptIA.trim()) return alert("Por favor escribe qué diseño quieres generar.");
                setGenerandoIA(true);
                setErrorIA("");
                try {
                    // ✅ Cambiado a imagen-3.0-generate-002 (disponible en plan gratuito)
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`;
                    const promptMejorado = `Fotografía macro de un bordado detallado y realista de: ${promptIA}. Hecho con hilos de colores aislados sobre un fondo COMPLETAMENTE BLANCO PURO. Textura de hilo y puntadas visibles, estilo artesanal, sin sombras proyectadas.`;
                    const result = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt: promptMejorado }, parameters: { sampleCount: 1 } })
                    });
                    if (result.predictions && result.predictions.length > 0) {
                        const imageUrlOriginal = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                        const imagenTransparente = await procesarFondoTransparente(imageUrlOriginal);
                        addItem(imagenTransparente);
                        setPromptIA("");
                    } else {
                        throw new Error("La IA no pudo generar esta imagen. Intenta describirlo de otra forma.");
                    }
                } catch (err) {
                    console.error(err);
                    setErrorIA(err.message || "Hubo un error. Inténtalo de nuevo.");
                } finally {
                    setGenerandoIA(false);
                }
            };

            const deleteItem = (id, e) => {
                e.stopPropagation();
                setPlacedItems(prev => prev.filter(item => item.id !== id));
                setSelectedId(null);
            };

            const onStart = (e, id, type) => {
                e.stopPropagation();
                setSelectedId(id);
                const item = placedItems.find(i => i.id === id);
                const clientX = e.clientX || e.touches?.[0].clientX;
                const clientY = e.clientY || e.touches?.[0].clientY;
                setAction({ id, type, startX: clientX, startY: clientY, initX: item.x, initY: item.y, initW: item.w });
            };

            useEffect(() => {
                const onMove = (e) => {
                    if (!action) return;
                    if (e.cancelable && e.type === 'touchmove') e.preventDefault();
                    const clientX = e.clientX || e.touches?.[0].clientX;
                    const clientY = e.clientY || e.touches?.[0].clientY;
                    const deltaX = clientX - action.startX;
                    const deltaY = clientY - action.startY;
                    setPlacedItems(prev => prev.map(item => {
                        if (item.id !== action.id) return item;
                        if (action.type === 'move') return { ...item, x: action.initX + deltaX, y: action.initY + deltaY };
                        return { ...item, w: Math.max(30, action.initW + deltaX) };
                    }));
                };
                const onEnd = () => setAction(null);
                if (action) {
                    window.addEventListener('pointermove', onMove, { passive: false });
                    window.addEventListener('pointerup', onEnd);
                    return () => {
                        window.removeEventListener('pointermove', onMove);
                        window.removeEventListener('pointerup', onEnd);
                    };
                }
            }, [action]);

            return (
                <div className="flex flex-col lg:flex-row bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden mb-12">
                    <aside className="w-full lg:w-80 bg-white p-6 border-b lg:border-b-0 lg:border-r border-stone-200 space-y-6 z-10 flex-shrink-0">
                        <div>
                            <h2 className="text-xl font-bold text-stone-800 mb-1">{titulo}</h2>
                            <p className="text-sm text-stone-500 mb-4">{textoVacio}</p>
                        </div>
