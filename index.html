<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primordial - Visualizador</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cushion-item { touch-action: none; user-select: none; }
        .resize-handle { width: 14px; height: 14px; background: #000; border: 2px solid #fff; border-radius: 50%; position: absolute; bottom: -7px; right: -7px; cursor: nwse-resize; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const CUSHION_CATALOG = [
            { id: 'c1', name: 'Ajedrez Terciopelo', src: 'https://i.postimg.cc/Cz2Nqz5R/image.png' },
            { id: 'c2', name: 'Cojín 2', src: 'https://i.postimg.cc/R3dJwDdd/image.png' },
            { id: 'c3', name: 'Cojín 3', src: 'https://i.postimg.cc/SnNhJ1nt/image.png' },
            { id: 'c4', name: 'Cojín 4', src: 'https://i.postimg.cc/878ZY7GD/image.png' }
        ];

        function App() {
            const [bgImage, setBgImage] = useState(null);
            const [placedItems, setPlacedItems] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [action, setAction] = useState(null); // 'move' o 'resize'

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) setBgImage(URL.createObjectURL(file));
            };

            const addCushion = (c) => {
                if(!bgImage) return alert("Sube una foto de tu sala primero");
                const newItem = { id: Date.now(), src: c.src, x: 200, y: 200, w: 150 };
                setPlacedItems([...placedItems, newItem]);
                setSelectedId(newItem.id);
            };

            const onStart = (e, id, type) => {
                e.stopPropagation();
                setSelectedId(id);
                const item = placedItems.find(i => i.id === id);
                const clientX = e.clientX || e.touches?.[0].clientX;
                const clientY = e.clientY || e.touches?.[0].clientY;
                setAction({ 
                    id, 
                    type, 
                    startX: clientX, 
                    startY: clientY, 
                    initX: item.x, 
                    initY: item.y, 
                    initW: item.w 
                });
            };

            useEffect(() => {
                const onMove = (e) => {
                    if (!action) return;
                    const clientX = e.clientX || e.touches?.[0].clientX;
                    const clientY = e.clientY || e.touches?.[0].clientY;
                    const deltaX = clientX - action.startX;

                    setPlacedItems(prev => prev.map(item => {
                        if (item.id !== action.id) return item;
                        if (action.type === 'move') {
                            return { ...item, x: action.initX + deltaX, y: action.initY + (clientY - action.startY) };
                        } else {
                            return { ...item, w: Math.max(50, action.initW + deltaX) };
                        }
                    }));
                };
                const onEnd = () => setAction(null);
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onEnd);
                return () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onEnd);
                };
            }, [action]);

            return (
                <div className="min-h-screen bg-stone-50 flex flex-col font-sans select-none">
                    <header className="bg-white p-4 border-b flex justify-between items-center shadow-sm">
                        <h1 className="text-xl font-bold tracking-tighter">PRIMORDIAL</h1>
                        <span className="text-[10px] uppercase tracking-widest text-stone-400">Visualizador</span>
                    </header>
                    <main className="flex flex-col lg:flex-row flex-1 overflow-hidden">
                        <aside className="w-full lg:w-72 bg-white p-6 border-r space-y-6 z-10">
                            <h2 className="text-xs font-bold uppercase">1. Foto de tu sala</h2>
                            <input type="file" onChange={handleImageUpload} className="text-xs w-full" />
                            <h2 className="text-xs font-bold uppercase mt-4">2. Cojines</h2>
                            <div className="grid grid-cols-2 gap-2">
                                {CUSHION_CATALOG.map(c => (
                                    <div key={c.id} onClick={() => addCushion(c)} className="border p-2 rounded hover:border-black cursor-pointer bg-white">
                                        <img src={c.src} className="w-full h-10 object-contain" />
                                    </div>
                                ))}
                            </div>
                        </aside>
                        <section className="flex-1 p-4 flex items-center justify-center bg-stone-100 relative overflow-hidden" onPointerDown={() => setSelectedId(null)}>
                            {!bgImage ? (
                                <p className="text-stone-400">Carga una foto para empezar</p>
                            ) : (
                                <div className="relative shadow-2xl bg-white inline-block">
                                    <img src={bgImage} className="max-h-[80vh] block pointer-events-none" />
                                    {placedItems.map(item => (
                                        <div 
                                            key={item.id} 
                                            onPointerDown={(e) => onStart(e, item.id, 'move')}
                                            style={{ left: item.x, top: item.y, width: item.w, transform
